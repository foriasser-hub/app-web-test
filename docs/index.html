<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord de présence - Redirection</title>
    <meta http-equiv="refresh" content="2; url=dashboard.html">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: white;
            color: #333;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #f8f9fa;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Tableau de bord de présence</h1>
        <p>L'application est prête ! Redirection en cours...</p>
        <div class="spinner"></div>
        <p>Si la redirection ne fonctionne pas automatiquement :</p>
        <a href="dashboard.html" class="btn">🚀 Ouvrir le tableau de bord maintenant</a>
        <p style="margin-top: 30px; font-size: 0.9rem; opacity: 0.8;">
            © 2026 Foriasser Hub • Développé avec ❤️
        </p>
    </div>
</body>
</html>

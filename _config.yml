# GitHub Pages configuration
title: "Tableau de bord de présence des employés"
description: "Application React moderne pour la gestion de la présence des employés"
theme: jekyll-theme-cayman
show_downloads: true
github:
  is_project_page: true
  
# Build settings
baseurl: "/app-web-test"
url: "https://foriasser-hub.github.io"

# Enable plugins
plugins:
  - jekyll-sitemap
  - jekyll-feed
  
# Exclude from processing
exclude:
  - node_modules/
  - dist/
  - .github/
  - .vscode/
  - .gitignore
  - package.json
  - package-lock.json
  - vite.config.js
  - README.md
  - LICENSE
  
# Defaults for pages
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"